<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <g transform="translate(120, 115)">
    <circle cx="0" cy="0" r="95" fill="none" stroke="#BE2156" stroke-width="6"/>
    
    <circle cx="0" cy="0" r="75" fill="#BE2156" filter="url(#shadow)"/>
    
    <g transform="rotate(45)">
      <rect x="-35" y="-11" width="70" height="22" fill="#FFFFFF" rx="2"/>
      <rect x="-11" y="-35" width="22" height="70" fill="#FFFFFF" rx="2"/>
    </g>
  </g>
</svg>
