<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 550" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    
    <linearGradient id="topGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFEFEF"/>
      <stop offset="100%" stop-color="#DFDFDF"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="550" fill="#FFFFFF"/>

  <rect width="1200" height="220" fill="url(#topGradient)"/>

  <rect y="220" width="1200" height="8" fill="#A8A8A8"/>

  <g transform="translate(330, 390)">
    <circle cx="0" cy="0" r="95" fill="none" stroke="#2B73B3" stroke-width="6"/>
    
    <circle cx="0" cy="0" r="62" fill="none" stroke="#2B73B3" stroke-width="26" filter="url(#shadow)"/>
    
    <circle cx="0" cy="0" r="20" fill="#2B73B3" filter="url(#shadow)"/>
  </g>

  <g transform="translate(870, 390)">
    <circle cx="0" cy="0" r="95" fill="none" stroke="#BE2156" stroke-width="6"/>
    
    <circle cx="0" cy="0" r="75" fill="#BE2156" filter="url(#shadow)"/>
    
    <g transform="rotate(45)">
      <rect x="-35" y="-11" width="70" height="22" fill="#FFFFFF" rx="2"/>
      <rect x="-11" y="-35" width="22" height="70" fill="#FFFFFF" rx="2"/>
    </g>
  </g>
</svg>
